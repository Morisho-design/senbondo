<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>千本堂カスタマイズ</title>

<style>
body{margin:0;font-family:sans-serif;background:#fff}
.app{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
@media (max-width:980px){.app{grid-template-columns:1fr}}
.stage{position:relative;width:100%;aspect-ratio:1;background:#fff}
.layer{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.menuCard{overflow:auto}
button{cursor:pointer}
</style>
</head>

<body>

<div class="app">

<div class="stage">
<img id="layer-base" class="layer">
<img id="layer-unit" class="layer">
<img id="layer-back" class="layer">
<img id="layer-center" class="layer">
<img id="layer-hashira" class="layer">
<img id="layer-door" class="layer">
</div>

<div class="menuCard">
<button onclick="resetAll()">初期状態に戻す</button>
<div id="controls"></div>
</div>

</div>

<script>
const BASE_FILE = "base/base.png";

const PARTS = [
{
key:"door",
jp:"上台戸板",
layerId:"layer-door",
options:[
{id:"normal",label:"通常",file:"door/door_normal.png"},
{id:"yaraido4",label:"矢来堂4枚",file:"door/door_yaraido4.png"},
{id:"yaraido2",label:"矢来堂2枚",file:"door/door_yaraido2.png"}
],
defaultId:"normal"
},
{
key:"unit",
jp:"下台戸板",
layerId:"layer-unit",
options:[
{id:"normal",label:"通常",file:"unit/unit_normal.png"},
{id:"yaraido",label:"矢来堂",file:"unit/unit_yaraido.png"},
{id:"yaraidozenmen",label:"矢来堂全面",file:"unit/unit_yaraidozenmen.png"}
],
defaultId:"normal"
},
{
key:"center",
jp:"背板中央",
layerId:"layer-center",
options:[
{id:"normal",label:"未選択",file:"center/center_normal.png"}
],
defaultId:"normal"
},
{
key:"back",
jp:"背板全面",
layerId:"layer-back",
options:[
{id:"normal",label:"通常",file:"back/back_normal.png"}
],
defaultId:"normal"
},
{
key:"hashira",
jp:"柱",
layerId:"layer-hashira",
options:[
{id:"on",label:"ON",file:"hashira/hashira_on.png"},
{id:"off",label:"OFF",file:"hashira/hashira_off.png"}
],
defaultId:"on"
}
];

const state = {};

function isYaraido(id){
return id && id.startsWith("yaraido");
}

function setImg(id,src){
document.getElementById(id).src=src+"?"+Date.now();
}

function syncUI(){
PARTS.forEach(p=>{
const opt=p.options.find(o=>o.id===state[p.key]);
if(opt)setImg(p.layerId,opt.file);
});
}

function normalize(changed){

const doorY=isYaraido(state.door);
const unitY=isYaraido(state.unit);

if(changed==="door"){
if(doorY){
if(!unitY) state.unit="yaraido";
}else{
if(unitY) state.unit="normal";
}
}

if(changed==="unit"){
if(unitY){
if(!doorY) state.door="yaraido4";
}else{
if(doorY) state.door="normal";
}
}

}

function apply(key,id){
state[key]=id;
normalize(key);
syncUI();
}

function render(){

const root=document.getElementById("controls");
root.innerHTML="";

PARTS.forEach(part=>{
const div=document.createElement("div");

const title=document.createElement("h3");
title.textContent=part.jp;
div.appendChild(title);

part.options.forEach(opt=>{
const btn=document.createElement("button");
btn.textContent=opt.label;
btn.onclick=()=>apply(part.key,opt.id);
div.appendChild(btn);
});

root.appendChild(div);
});

}

function resetAll(){

setImg("layer-base",BASE_FILE);

PARTS.forEach(p=>{
state[p.key]=p.defaultId;
});

syncUI();

}

render();
resetAll();
</script>

</body>
</html>
