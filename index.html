<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>千本堂カスタマイズ</title>

<style>
:root{
  --bg:#ffffff;
  --panel:#f3f4f6;
  --panel2:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --btn:#e5e7eb;
  --btnText:#111827;
  --btnActive:#2563eb;
  --btnActiveText:#ffffff;
  --radius:18px;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* Layout */

.app{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:16px;
  min-height:100vh;
}

@media (max-width:980px){
  .app{
    grid-template-columns:1fr;
  }
}

.menuCard{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  overflow:auto;
  box-shadow:var(--shadow);
}

.viewerCard{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Stage */

.stage{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
}

.layer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
}

/* UI */

.bottomActions{
  margin-top:12px;
  display:flex;
  gap:8px;
}

.pdfBtn{
  border:1px solid var(--border);
  background:#fff;
  border-radius:12px;
  padding:10px 12px;
  cursor:pointer;
  min-height:40px;
  width:100%;
}

.toast{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  background:rgba(17,24,39,.92);
  color:#fff;
  padding:10px 12px;
  border-radius:12px;
  font-size:13px;
  opacity:0;
  transition:opacity .18s ease;
}

.toast.show{opacity:1}

/* export */

.exportSheet{
  position:fixed;
  left:-99999px;
  width:794px;
  height:1123px;
  background:#fff;
  padding:24px;
}

.exportStage{
  position:relative;
  width:100%;
  max-width:490px;
  aspect-ratio:1/1;
}

.exportLayer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
}

</style>
</head>

<body>

<div class="app">

<section class="viewerCard">
<div class="stage" id="stage">
<img id="layer-base" class="layer">
<img id="layer-unit" class="layer">
<img id="layer-back" class="layer">
<img id="layer-center" class="layer">
<img id="layer-hashira" class="layer">
<img id="layer-door" class="layer">
</div>
</section>

<aside class="menuCard">

<h2>千本堂カスタマイズ</h2>

<div class="bottomActions">
<button id="pdfBtn" class="pdfBtn">PDF出力</button>
<button id="imgBtn" class="pdfBtn">画像保存</button>
</div>

</aside>

</div>

<div class="toast" id="toast"></div>

<div id="exportSheet" class="exportSheet">

<div class="exportStage">

<img id="exp-base" class="exportLayer">
<img id="exp-unit" class="exportLayer">
<img id="exp-back" class="exportLayer">
<img id="exp-center" class="exportLayer">
<img id="exp-hashira" class="exportLayer">
<img id="exp-door" class="exportLayer">

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>

function $(id){
return document.getElementById(id);
}

function toast(msg){
const t=$("toast");
t.textContent=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),1200);
}

function fillExportSheet(){

$("exp-base").src=$("layer-base").src;
$("exp-unit").src=$("layer-unit").src;
$("exp-back").src=$("layer-back").src;
$("exp-center").src=$("layer-center").src;
$("exp-hashira").src=$("layer-hashira").src;
$("exp-door").src=$("layer-door").src;

}

async function exportPdf(){

fillExportSheet();

const canvas=await html2canvas($("exportSheet"),{
backgroundColor:"#fff",
scale:2
});

const img=canvas.toDataURL("image/jpeg",0.98);

const {jsPDF}=window.jspdf;
const pdf=new jsPDF("p","mm","a4");

pdf.addImage(img,"JPEG",5,5,200,287);

pdf.save("senbondo.pdf");

toast("PDFを書き出しました");

}

async function exportImage(){

fillExportSheet();

const canvas=await html2canvas($("exportSheet"),{
backgroundColor:"#fff",
scale:2
});

const img=canvas.toDataURL("image/jpeg",0.98);

const link=document.createElement("a");

const now=new Date();

const name=
"senbondo_"+
now.getFullYear()+
String(now.getMonth()+1).padStart(2,"0")+
String(now.getDate()).padStart(2,"0")+"_"+
String(now.getHours()).padStart(2,"0")+
String(now.getMinutes()).padStart(2,"0")+
".jpg";

link.href=img;
link.download=name;
link.click();

toast("画像を書き出しました");

}

$("pdfBtn").addEventListener("click",exportPdf);
$("imgBtn").addEventListener("click",exportImage);

</script>

</body>
</html>
